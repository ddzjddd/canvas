spring:
  datasource:
    url: jdbc:h2:file:./canvasdb;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
canvas:
  master-key: ${CANVAS_MASTER_KEY:dev-master-key-change-me}
